version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - LEGACY_TOKEN=${LEGACY_TOKEN}
      - PORT=5005
      - IMAGE_BASE_URL=${IMAGE_BASE_URL:-https://sufyan-backend.siparisyonet.online}
    volumes:
      - backend_images:/app/images
    networks:
      - sufyan-net
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${PROJECT_NAME:-sufyan}-backend.rule=Host(`${API_DOMAIN:-sufyan-backend.siparisyonet.online}`)"
      - "traefik.http.routers.${PROJECT_NAME:-sufyan}-backend.entrypoints=websecure"
      - "traefik.http.routers.${PROJECT_NAME:-sufyan}-backend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.${PROJECT_NAME:-sufyan}-backend.priority=90"
      - "traefik.http.services.${PROJECT_NAME:-sufyan}-backend.loadbalancer.server.port=5005"

  panel:
    build:
      context: ./panel
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-https://sufyan-backend.siparisyonet.online}
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - sufyan-net
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${PROJECT_NAME:-sufyan}-panel.rule=Host(`${PANEL_DOMAIN:-sufyan.siparisyonet.online}`)"
      - "traefik.http.routers.${PROJECT_NAME:-sufyan}-panel.entrypoints=websecure"
      - "traefik.http.routers.${PROJECT_NAME:-sufyan}-panel.tls.certresolver=letsencrypt"
      - "traefik.http.routers.${PROJECT_NAME:-sufyan}-panel.priority=100"
      - "traefik.http.services.${PROJECT_NAME:-sufyan}-panel.loadbalancer.server.port=80"

volumes:
  backend_images:

networks:
  sufyan-net:
    driver: bridge
  dokploy-network:
    external: true
